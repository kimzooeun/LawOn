services:
  frontend:
    build: ./frontend/front
    image: finalproject-frontend
    container_name: finalproject-front
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/front:/app # лЎңм»¬ мҶҢмҠӨлҘј м»Ён…Ңмқҙл„Ҳ /app м—җ м—°кІ°
      - /app/node_modules # node_modulesлҠ” нҳёмҠӨнҠёлһ‘ л¶„лҰ¬ (м¶©лҸҢ л°©м§Җ)
    environment:
      - CHOKIDAR_USEPOLLING=true # ліҖкІҪ к°җм§Җ нҷңм„ұнҷ” (WSL/Windowsм—җм„ң н•„мҲҳ)
    command: npm run dev # н”„лЎңлҚ•м…ҳмҡ©мқҙ м•„лӢҲлқј к°ңл°ңмҡ© лӘ…л №мңјлЎң мӢӨн–ү
    env_file:
      - .env
    restart: always
    depends_on:
      backend:
        condition:
          service_healthy # лҸ„м»Өк°Җ backendмқҳ /actuator/health (Spring Boot кё°ліё н—¬мҠӨ мІҙнҒ¬) м—җм„ң
          # вҖңOKвҖқ мқ‘лӢөмқ„ л°ӣмқ„ л•Ңк№Ңм§Җ кё°лӢӨл ёлӢӨк°Җ frontendлҘј мӢңмһ‘
    develop:
      watch:
        - action: rebuild
          path: package.json

  backend:
    build: ./backend
    image: finalproject-backend
    container_name: finalproject-backend
    ports:
      - "${BACKEND_PORT}:8080"
      - "35729:35729" # LiveReload нҸ¬нҠё м¶”к°Җ
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
    command: ./gradlew bootRun --continuous --no-daemon # рҹ‘Ҳ мҲҳм •

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

    env_file:
      - .env
    restart: always
    volumes:
      - ./backend:/app
      - /app/build
      - gradle_cache:/home/gradle/.gradle
    depends_on:
      fastapi:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
          ignore:
            - build/
            - target/
        - action: rebuild
          path: ./backend/build.gradle
        - action: rebuild
          path: ./backend/settings.gradle

  fastapi:
    build: ./fastapi
    image: finalproject-fastapi
    container_name: finalproject-fastapi
    ports:
      - "${FASTAPI_PORT}:8000"
    env_file:
      - .env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: finalproject-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Seoul

    env_file: # рҹ‘Ҳ 1. [мҲҳм •] .env нҢҢмқјмқ„ мқҪлҸ„лЎқ м¶”к°Җ
      - .env

    ports:
      - "3307:3306" # лЎңм»¬ 3306 вҶ” м»Ён…Ңмқҙл„Ҳ 3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    healthcheck:
      test: # рҹ‘Ҳ 2. [мҲҳм •] CMD-SHELLлЎң ліҖкІҪ
        ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 300s # рҹ‘Ҳ 3. [мҲҳм •] 5л¶„(300мҙҲ)мңјлЎң мң мҳҲ кё°к°„ м„Өм •

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    container_name: finalproject-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  gradle_cache:

networks:
  default:
    name: finalproject-network
