services:
  frontend:
    build: ./frontend/front
    image: finalproject-frontend
    container_name: finalproject-front
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/front:/app        # 로컬 소스를 컨테이너 /app 에 연결
      - /app/node_modules            # node_modules는 호스트랑 분리 (충돌 방지)  
    environment:
      - CHOKIDAR_USEPOLLING=true     # 변경 감지 활성화 (WSL/Windows에서 필수)
    command: npm run dev             # 프로덕션용이 아니라 개발용 명령으로 실행
    env_file:
      - .env
    restart: always
    depends_on:
      backend:
        condition: service_healthy   # 도커가 backend의 /actuator/health (Spring Boot 기본 헬스 체크) 에서
                                     # “OK” 응답을 받을 때까지 기다렸다가 frontend를 시작
    develop:
      watch:
        - action: sync
          path: ./frontend/front
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json        

  backend:
    build: ./backend
    image: finalproject-backend
    container_name: finalproject-backend
    ports:
      - "${BACKEND_PORT}:8080"
      - "35729:35729"  # LiveReload 포트 추가
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
    command: ./gradlew bootRun --continuous --no-daemon  # 👈 수정

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

    env_file:
      - .env
    restart: always
    volumes:
      - ./backend:/app
      - /app/build
      - gradle_cache:/home/gradle/.gradle
    depends_on:
      fastapi:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
          ignore:
            - build/
            - target/
        - action: rebuild
          path: ./backend/build.gradle
        - action: rebuild
          path: ./backend/settings.gradle


  fastapi:
    build: ./fastapi
    image: finalproject-fastapi
    container_name: finalproject-fastapi
    ports:
      - "${FASTAPI_PORT}:8000"
    env_file:
      - .env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: finalproject-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Seoul
    ports:
      - "3307:3306"  # 로컬 3306 ↔ 컨테이너 3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    healthcheck:
      test:  [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${DB_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    container_name: finalproject-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  gradle_cache:

networks: 
  default: 
    name: 
      finalproject-network
    