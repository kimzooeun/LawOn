spring:
  thymeleaf:
    check-template-location: false
  application:
    name: backend
  server:
    port: ${BACKEND_PORT}

  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 250MB
  # --- м •м Ғ нҢҢмқј м„ңл№ҷ м„Өм • (мӢ к·ң м¶”к°Җ) ---
  mvc:
    static-path-pattern: /uploads/**   # URL нҢЁн„ҙ: http://.../uploads/нҢҢмқјлӘ…
  web:
    resources:
      static-locations: file:/app/uploads/  # мӢӨм ң л¬јлҰ¬ кІҪлЎң (лҸ„м»Ө м•Ҳ кё°мӨҖ)

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none         # (update вҶ’ none мңјлЎң кі м •, MySQLмқј л•Ңл§Ң м Ғмҡ©)
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        naming:
          physical-strategy: com.prinCipal.chatbot.config.SnakeCaseNamingStrategy

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      client-type: lettuce
      timeout: 3000ms
      connect-timeout: 5000ms

  cache:
    type: redis

  h2:
    console:
      enabled: false     # мӢӨм ң MySQL мӮ¬мҡ© мӢң л№„нҷңм„ұнҷ” 
      path: /h2-console
  devtools:
     restart:
       enabled: true
       poll-interval: 2s  # м¶”к°Җ: 2мҙҲл§ҲлӢӨ мІҙнҒ¬
       quiet-period: 400ms   # м¶”к°Җ: ліҖкІҪ нӣ„ 1мҙҲ лҢҖкё°
       additional-paths:
         - src/main/java
     livereload:
       enabled: true
       port: 35729
# JWT л°Ҹ Security кҙҖл Ё м„Өм •
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:3600000}   # 1мӢңк°„ (ms лӢЁмң„)
      refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:2}


    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}  
            scope: profile, email
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email,profile_image
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            redirect-uri: ${NAVER_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-name: naver
            scope: nickname, profile_image, email
      
        provider: # OAuth2 м ңкіөмһҗ м •ліҙ(м№ҙм№ҙмҳӨ м„ңлІ„ URL л“ұ)
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

file:
  upload-dir: /app/uploads  # м„ңл№„мҠӨм—җм„ң нҢҢмқј м ҖмһҘн•  кІҪлЎң

# Redis queue key (fastapi вҶ” spring м—°кІ°мҡ©)
app:
  redis:
    queue-key: ${REDIS_QUEUE_KEY:chatlog_queue}
  frontend:
    url: ${FRONTEND_URL} 
    internal_url : ${FRONTEND_INTERNAL_URL}
  backend:
    url: ${BACKEND_URL}
    
cloud:
  aws:
    s3:
      bucket: principalbbucket
      
      
# Health check, actuator м„Өм •
management:
  endpoints:
    web:
      exposure:
        include: health, info     
  endpoint:
    health:
      show-details: always
  server:
    port: 8080
  health:
    redis:
      enabled: false
