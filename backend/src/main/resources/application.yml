spring:
  thymeleaf:
    check-template-location: false
  application:
    name: backend
  server:
    port: ${BACKEND_PORT}

  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 250MB
  # --- 정적 파일 서빙 설정 (신규 추가) ---
  mvc:
    static-path-pattern: /uploads/** # (1) /uploads/.. 패턴으로 웹에서 접근 허용
  web:
    resources:
      static-locations: file:./uploads/ # (2) 실제 물리적 경로 ./uploads/ 폴더와 매핑
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update         # (update → none 으로 고정, MySQL일 때만 적용)
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        naming:
          physical-strategy: com.prinCipal.chatbot.config.SnakeCaseNamingStrategy

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      client-type: lettuce
      timeout: 3000ms
      connect-timeout: 5000ms

  cache:
    type: redis

  h2:
    console:
      enabled: false     # 실제 MySQL 사용 시 비활성화 
      path: /h2-console
  devtools:
     restart:
       enabled: true
       poll-interval: 2s  # 👈 추가: 2초마다 체크
       quiet-period: 400ms   # 👈 추가: 변경 후 1초 대기
       additional-paths:
         - src/main/java
     livereload:
       enabled: true
       port: 35729
# JWT 및 Security 관련 설정
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:3600000}   # 1시간 (ms 단위)
      refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:2}


    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}  
            scope: profile, email
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email,profile_image
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            redirect-uri: ${NAVER_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-name: naver
            scope: nickname, profile_image, email
      
        provider: # OAuth2 제공자 정보(카카오 서버 URL 등)
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# Redis queue key (fastapi ↔ spring 연결용)
app:
  redis:
    queue-key: ${REDIS_QUEUE_KEY:chatlog_queue}
  frontend:
    url: ${FRONTEND_URL} 
    internal_url : ${FRONTEND_INTERNAL_URL}
  backend:
    url: ${BACKEND_URL}

# Health check, actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  server:
    port: 8080
  health:
    redis:
      enabled: false
