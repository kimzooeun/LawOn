spring.application.name=backend
server.port=${BACKEND_PORT}


spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=250MB

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl


spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}


spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.client-type=lettuce
spring.data.redis.timeout=3000ms
spring.data.redis.connect-timeout=5000ms
spring.cache.type=redis



app.redis.queue-key=${REDIS_QUEUE_KEY:chatlog_queue}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.server.port=8080


# Redis health check™”
management.health.redis.enabled=false
spring.jpa.open-in-view=false