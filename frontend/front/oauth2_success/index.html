<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 처리 중...</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(180deg, #fafafa, #f0f0f0);
      font-family: 'Pretendard', sans-serif;
      color: #333;
      margin: 0;
    }
    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #ffd600; 
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }
    p {
      font-size: 0.95rem;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h2>로그인 처리 중...</h2>
  <p>잠시만 기다려주세요 😊</p>
  <div class="auth-toast" id="auth-toast"></div>

  <script type="module" src="/src/js/tokenApi.js"></script>
  <script type="module">
    import { TokenManager } from '/src/js/token.js';
    window.addEventListener('DOMContentLoaded',() =>{
      const params = new URLSearchParams(window.location.search)
      const accessToken = params.get("token");
      const userId = params.get("userId");
      const displaynickname = params.get("displayName");
      const provider = params.get("provider");
      const USER_ID_KEY = "todak_user_id";
      const NICK_KEY = "todak_nickname";

      if(accessToken){
      TokenManager.setTokens(accessToken, false);
      localStorage.setItem(USER_ID_KEY, userId);
      localStorage.setItem(NICK_KEY, displaynickname);
      showToast(`${displaynickname}님 환영합니다! (${provider} 로그인)`);
  
      setTimeout(() => {
        window.location.replace('/chat'); // 히스토리에서 제거하고 이동
      }, 700);
      } else{
        console.error("로그인 토큰이 전달되지 않았습니다.");
        showToast("로그인 중 오류가 발생했습니다.");
    
        setTimeout(() => {
          window.location.replace('/');   
        }, 500);
      }
    });
  

  function showToast(message) {
    const toast = document.getElementById("auth-toast");
    toast.innerHTML = message;
    toast.classList.add("show");

    setTimeout(() => {
      toast.classList.remove("show");
    }, 1000);
  }
  </script>
</body>
</html>
