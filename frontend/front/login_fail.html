<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 실패</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Pretendard', sans-serif;
      color: #D32F2F; /* 빨간색 계열 */
      background: #FFEBEE; /* 연한 빨간 배경 */
      margin: 0;
      text-align: center;
    }
    .error-container {
      background: #FFFFFF;
      padding: 30px 50px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 20px;
    }
    a {
      color: #1976D2;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h2>로그인 실패 😥</h2>
    <p id="errorMessage">소셜 로그인 과정에서 오류가 발생했습니다.</p>
    <p>잠시 후 메인 페이지로 돌아갑니다. (5초)</p>
    <p><a href="main.html">지금 바로 돌아가기</a></p>
  </div>

  <script>
    // URL에서 오류 파라미터를 읽어오는 스크립트
    function displayError() {
      const params = new URLSearchParams(window.location.search);
      const errorParam = params.get('error'); 
      const messageElement = document.getElementById('errorMessage');
      
      let message = "카카오 로그인 인증에 실패했습니다. 다시 시도해주세요.";
      
      // 백엔드에서 특정 에러 코드를 보냈을 때 메시지를 커스터마이징 할 수 있습니다.
      if (errorParam === 'access_denied') {
          message = "카카오 로그인 연동이 거부되었습니다.";
      } else if (errorParam === 'user_not_found') {
          message = "해당 계정 정보가 없습니다. 회원가입이 필요할 수 있습니다.";
      }
      // 백엔드에서 전달된 메시지가 있다면 사용합니다.
      // if (errorParam) { message = decodeURIComponent(errorParam); } 

      messageElement.textContent = message;
    }

    // 5초 후 main.html로 자동 리디렉션
    function autoRedirect() {
      setTimeout(() => {
        window.location.replace('main.html');
      }, 5000); // 5000ms = 5초
    }

    displayError();
    autoRedirect();
  </script>
</body>
</html>
