<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:image" content="images/og-lawon.png" />
  <title>LawOn</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/chat.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
</head>

<body>
  <div class="container" id="chat-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="collapse-btn" id="collapse-btn" aria-label="사이드바 접기">
          ☰
        </button>
        <div class="version-selector nav-text" id="logoBtn" style="cursor: pointer;">LawOn</div>
      </div>

      <button class="new-chat-btn" id="newChatBtn" title="새 채팅 시작">
        <span>💗</span><span class="nav-text">새 채팅</span>
      </button>

      <button class="explore-btn" id="exploreBtn">
        <span>✧</span><span class="nav-text">마이페이지</span>
      </button>

      <button class="explore-btn" id="lawyerBtn">
        <span>⚖️</span><span class="nav-text">변호사 페이지</span>
      </button>

      <nav class="recent-chats">
        <div class="recent-header">
          <h3 class="nav-text">최근</h3>
        </div>
        <ul id="recentList"></ul>
      </nav>

      <div class="sidebar-footer">
        <button class="footer-link" id="themeBtn" type="button">
          <span>↻</span><span class="nav-text">테마 변경</span>
        </button>
      </div>
    </aside>

    <section id="mypageExplore" class="mypage-explore page-section hidden" aria-labelledby="mypageTitle">
      <header class="mpx-hero">
        <div class="mpx-hero-inner">
          <button type="button" id="mpxBackBtn" class="mpx-back">
            ← 채팅으로
          </button>
          <h2 id="mypageTitle"><span id="mypageUserNickname"></span>님의 마이페이지</h2>
      </header>

      <div class="mpx-list-layout">
        <div class="mpx-section">
          <h4 class="mpx-section-title">계정 및 알림</h4>

          <button class="mpx-list-item" data-action="open-profile">
            <div class="mpx-item-icon">👤</div>
            <div class="mpx-item-text">
              <strong>닉네임 변경</strong>
              <p>채팅 상단에 표시되는 닉네임을 수정합니다.</p>
            </div>
            <span class="mpx-item-arrow">›</span>
          </button>

          <button class="mpx-list-item" data-action="open-security">
            <div class="mpx-item-icon">🔒</div>
            <div class="mpx-item-text">
              <strong>비밀번호 변경</strong>
              <p>로그인 보안을 위해 주기적으로 변경하세요.</p>
            </div>
            <span class="mpx-item-arrow">›</span>
          </button>

          <button class="mpx-list-item" data-action="toggle-push">
            <div class="mpx-item-icon">🔔</div>
            <div class="mpx-item-text">
              <strong>푸시 알림</strong>
              <p>상태 변경/결과 알림을 수신합니다.</p>
            </div>
            <span class="mpx-item-arrow">›</span>
          </button>
        </div>

        <div class="mpx-section">
          <h4 class="mpx-section-title">데이터 관리</h4>

          <button class="mpx-list-item" data-action="open-report">
            <div class="mpx-item-icon">📊</div>
            <div class="mpx-item-text">
              <strong>상담 내역</strong>
              <p>날짜별 상담 이력 및 요약을 확인합니다.</p>
            </div>
            <span class="mpx-item-arrow">›</span>
          </button>

          <button class="mpx-list-item" data-action="clear-chats">
            <div class="mpx-item-icon">🗑️</div>
            <div class="mpx-item-text">
              <strong>대화 전체 비우기</strong>
              <p>최근/보관 대화를 한 번에 삭제합니다.</p>
            </div>
            <span class="mpx-item-arrow">›</span>
          </button>

          <button class="mpx-list-item danger" data-action="open-withdrawal">
            <div class="mpx-item-icon">🚫</div>
            <div class="mpx-item-text">
              <strong>회원 탈퇴</strong>
              <p>모든 데이터를 삭제하고 계정을 영구적으로 비활성화합니다.</p>
            </div>
            <span class="mpx-item-arrow">›</span>
          </button>
        </div>

        <div class="mpx-section">
          <h4 class="mpx-section-title">지원 및 약관</h4>

          <button class="mpx-list-item" data-action="open-emergency">
            <div class="mpx-item-icon">🆘</div>
            <div class="mpx-item-text">
              <strong>긴급 연락</strong>
              <p>필요시 국가기관 전화번호를 빠르게 확인합니다.</p>
            </div>
            <span class="mpx-item-arrow">›</span>
          </button>

          <button class="mpx-list-item" data-action="open-privacy">
            <div class="mpx-item-icon">📜</div>
            <div class="mpx-item-text">
              <strong>개인정보처리방침</strong>
              <p>수집하는 개인정보 항목 및 이용 목적을 확인합니다.</p>
            </div>
            <span class="mpx-item-arrow">›</span>
          </button>

          <button class="mpx-list-item" data-action="open-terms">
            <div class="mpx-item-icon">📜</div>
            <div class="mpx-item-text">
              <strong>이용약관</strong>
              <p>서비스 이용에 관한 권리와 의무를 확인합니다.</p>
            </div>
            <span class="mpx-item-arrow">›</span>
          </button>
        </div>
      </div>
    </section>

    <section id="lawyerPage" class="mypage-explore page-section hidden" aria-labelledby="lawyerTitle">
      <header class="mpx-hero">
        <div class="mpx-hero-inner">
          <button type="button" id="lawyerBackBtn" class="mpx-back">
            ← 채팅으로
          </button>
          <h2 id="lawyerTitle">변호사 페이지</h2>

          <div class="controls" role="search" style="padding-top: 16px;">
            <input id="q" class="input" type="search" placeholder="이름/주소/키워드 검색" aria-label="검색" />

            <select id="type" class="select" aria-label="지역 필터">
              <option value="ALL">전체 지역</option>
              <option value="서울·수도권">서울·수도권</option>
              <option value="부산·영남권">부산·영남권</option>
              <option value="대전·충청권">대전·충청권</option>
              <option value="광주·전라·제주권">광주·전라·제주권</option>
            </select>

            <button id="exportBtn" class="btn ghost" type="button" title="현재 목록 CSV로 내보내기">CSV 내보내기</button>
            <button id="resetBtn" class="btn primary" type="button">필터 초기화</button>
          </div>
        </div>
      </header>

      <div class="mpx-grid">
        <main class="page" id="app" aria-live="polite"></main>

        <template id="section-tpl">
          <section class="section">
            <div class="section-title">
              <h2></h2>
              <div class="count"></div>
            </div>
            <div class="pills" data-pills></div>
            <div class="grid" data-grid></div>
          </section>
        </template>

        <template id="card-tpl">
          <article class="card">
            <div class="card__icon"></div>
            <div class="card__body">
              <div class="card__title"></div>
              <div class="card__meta"></div>
              <div class="desc"></div>
              <div class="actions"></div>
            </div>
          </article>
        </template>
      </div>
    </section>

    <section class="chat-area page-section hidden" id="chatArea" aria-live="polite">
      <header class="main-header">
        <div class="user-controls">

          <button class="btn outline-theme" id="headerLogoutBtn" title="로그아웃">
            로그아웃
          </button>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="input-section">
        <form class="input-wrapper" id="chatForm" autocomplete="off">
          <input id="chatInput" type="text" placeholder="토닥토닥이에게 물어보기(음성, 텍스트 모두 가능해요!)" aria-label="메시지 입력" />
          <button type="submit" class="btn primary" id="sendBtn" title="보내기">
            보내기
          </button>
          
          <button type="button" class="btn mic-btn" title="마이크" id="micBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
        </form>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="confirmModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirmTitle"
    aria-describedby="confirmDesc">
    <div class="modal-backdrop"></div>
    <div class="modal-card" role="document">
      <h3 id="confirmTitle">확인이 필요해요</h3>
      <p id="confirmDesc" class="modal-message">
        ⚠ 경고! 삭제 시 대화 내용을 되돌릴 수 없습니다
      </p>
      <div class="modal-actions">
        <button id="confirmCancel" type="button" class="btn ghost">
          취소
        </button>
        <button id="confirmOk" type="button" class="btn danger">
          삭제
        </button>
      </div>
    </div>
  </div>

  <div id="formModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="formModalTitle">
    <div class="modal-backdrop"></div>
    <div class="modal-card" role="document">
      <header class="modal-header">
        <h3 id="formModalTitle" class="modal-title"></h3>
        <button id="formModalClose" class="btn ghost" type="button" aria-label="닫기">
          ✕
        </button>
      </header>
      <form id="formModalBody" class="modal-form-body"></form>
      <div class="modal-actions">
        <button id="formModalCancel" type="button" class="btn ghost">
          취소
        </button>
        <button id="formModalOk" type="button" class="btn primary">
          저장
        </button>
      </div>
    </div>
  </div>

  <template id="emptyChatTemplate">
    <div class="empty-hint">
      <h1 class="empty-hint-title">
        안녕하세요, <span class="empty-hint-nickname">게스트</span>님
      </h1>
      <p class="empty-hint-subtitle">
        무엇을 도와드릴까요?
      </p>
    </div>
  </template>

  <script type="module" src="/js/tokenApi.js"></script>
  <script type="module" src="/js/token.js"></script>
  <script type="module" src="/js/api.js"></script>
  <script type="module" src="/js/utils.js"></script>
  <script type="module" src="/js/chat.js"></script>
  <script type="module" src="/js/stt.js"></script>
  <script type="module" src="/js/theme.js"></script>
  <script type="module" src="/js/mypage.js"></script>
  <script type="module" src="/js/policy.js"></script>
  <script type="module" src="/js/lawyer.js"></script>
  <script type="module" src="/js/init.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>

</html>
