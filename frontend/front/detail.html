<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>전국 상담·법률 상세페이지</title>
  <link rel="icon" type="image/png" sizes="32x32" href="images/black.png?v=2">
  <link rel="stylesheet" href="css/detail.css">
</head>
<body>
  <!-- 헤더 -->
  <header class="header" role="banner">
    <div class="header__inner">
      <div class="logo">
      <img src="images/black.png" alt="로고" class="logo-icon" />
      </div>
        <div class="brand">
        <div class="brand__text">전국 상담·법률 디렉토리</div>
      </div>

      <div class="controls" role="search">
        <input id="q" class="input" type="search" placeholder="이름/주소/키워드 검색" aria-label="검색" />
        <select id="type" class="select" aria-label="유형 필터">
          <option value="all">전체 유형</option>
          <option value="law">변호사 사무실</option>
          <option value="mind">심리·고민 상담</option>
        </select>
        <button id="exportBtn" class="btn ghost" type="button" title="현재 목록 CSV로 내보내기">CSV 내보내기</button>
        <button id="resetBtn" class="btn primary" type="button">필터 초기화</button>
      </div>
    </div>
  </header>

  <!-- 권역 탭이 여기에 동적으로 삽입됨 -->
  <main class="page" id="app" aria-live="polite"></main>

  <!-- 템플릿들 -->
  <template id="section-tpl">
    <section class="section">
      <div class="section-title">
        <h2></h2>
        <div class="count"></div>
      </div>
      <div class="pills" data-pills></div>
      <div class="grid" data-grid></div>
    </section>
  </template>

  <template id="card-tpl">
    <article class="card">
      <div class="card__icon"></div>
      <div class="card__body">
        <div class="card__title"></div>
        <div class="card__meta"></div>
        <div class="desc"></div>
        <div class="actions"></div>
      </div>
    </article>
  </template>

  <script src="js/detail.js" defer></script>
  <script src="js/theme.js" defer></script>

</body>
</html>
