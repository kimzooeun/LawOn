<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시스템 설정 | 토닥토닥이 어드민</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/black.png?v=2">
  <link rel="stylesheet" href="/admin/css/settings.css" />
  <link rel="stylesheet" href="/admin/css/admin.css?v=1">

</head>

<body>
  <header class="admin-header">
    <div class="logo">
      <img src="/images/black.png" alt="로고" />
      <h1>시스템 설정</h1>
    </div>
    <nav class="admin-nav">
      <div class="page-buttons">
        <a href="/admin" class="nav-link">📊 대시보드</a>
        <a href="/admin/user" class="nav-link">👥 회원 관리</a>
        <a href="/admin/lawyers" class="nav-link">👨‍⚖️ 변호사 관리</a>
        <a href="/admin/logs" class="nav-link">🧾 상담 관리</a>
        <a href="/admin/settings" class="nav-link active">⚙️ 설정</a>
      </div>
      <button id="logoutBtn" class="logout">로그아웃</button>
    </nav>
  </header>

  <main class="dashboard">
    <section class="settings-tabs">
      <div class="tab-buttons">
        <button class="tab-btn" data-tab="account">👤 계정 관리</button>
        <button class="tab-btn" data-tab="system">⚙️ 시스템 관리</button>
      </div>
      <div class="tab-panel" id="account">
        <h2>👤 관리자 계정 관리</h2>
        <label>현재 계정: </label>
        <div class="pw-box">
          <input type="password" id="currentPw" placeholder="현재 비밀번호 입력" />
          <input type="password" id="newPw" placeholder="새 비밀번호 입력" />
          <button id="pwChangeBtn">비밀번호 변경</button>
        </div>
      </div>

      <!-- 시스템 관리 -->
      <div class="tab-panel" id="system">
        <h2>⚙️ 시스템 관리</h2>
        <button id="resetBtn" class="sys-btn danger">🗑 전체 초기화</button>
      </div>
      </div>
    </section>
  </main>

  <footer class="admin-footer">
    © 2025 LawON ADMIN Panel
  </footer>

  <!-- 1) TokenManager 먼저 로드 -->
  <script type="module" src="/src/js/token.js"></script>
  <!-- 2) 관리자용 fetch 인터셉트 적용 -->
  <script type="module" src="../js/tokenApi_Admin.js"></script>
  <!-- 3) 마지막에 페이지 스크립트 실행 -->
  <script type="module" src="/admin/js/settings.js"></script>
  <script type="module" src="/admin/js/admin-logout.js"></script>




</body>

</html>
