<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>변호사 관리 | 토닥토닥이 어드민</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/black.png?v=2">
  <link rel="stylesheet" href="/admin/css/lawyers.css" />
  <link rel="stylesheet" href="/admin/css/admin.css?v=1">

</head>

<body>

  <header class="admin-header">
    <div class="logo">
      <img src="/images/black.png" alt="로고" />
      <h1>변호사 등록 / 관리</h1>
    </div>
    <nav class="admin-nav">
      <div class="page-buttons">
      <a href="/admin" class="nav-link">📊 대시보드</a>
      <a href="/admin/user" class="nav-link">👥 회원 관리</a>
      <a href="/admin/lawyers" class="nav-link">👨‍⚖️ 변호사 관리</a>
      <a href="/admin/logs" class="nav-link">🧾 상담 관리</a>
      <a href="/admin/settings" class="nav-link">⚙️ 설정</a>
      <button id="logoutBtn">로그아웃</button>
      </div>
    </nav>
  </header>

  <main class="dashboard">
    <!-- 등록 폼 -->
    <section class="lawyer-register">
      <h2>👨‍⚖️ 새 변호사 등록</h2>
        <form id="lawyerForm" class="lawyer-form">

        <input type="text" id="name" placeholder="이름" required>

        <select id="gender" required>
          <option value="">성별 선택</option>
          <option value="남">남</option>
          <option value="여">여</option>
        </select>

        <input type="text" id="detailSpecialty" placeholder="전문 분야(예: 이혼, 폭행등)" required>

        <textarea id="description" placeholder="소개글" required></textarea>

        <input type="text" id="office" placeholder="사무실명" required>

        <input type="text" id="officeLocation" placeholder="지역 (예: 서울 강남구)" required>

        <input type="text" id="contact" placeholder="연락처 (예: 010-1234-5678)" required>

        <!-- 이미지 업로드 추가 -->
        <label style="grid-column: 1 / -1;">프로필 이미지</label>
        <input type="file" id="imageFile">

        <button type="submit">등록</button>
      </form>

    </section>

    <!-- 검색 -->
    <section class="lawyer-search">
      <h2>🔍 변호사 검색</h2>
      <div class="filter-box">
        <input type="text" id="searchLawyer" placeholder="이름, 사무실, 전문분야 검색...">
        <button id="searchBtn">검색</button>
      </div>
    </section>

    <!-- 목록 -->
    <section class="lawyer-list">
      <h2>📋 등록된 변호사 목록</h2>
      <div class="table-wrapper">
        <table id="lawyerTable">
          <thead>
            <tr>
              <th>사진</th>
              <th>이름</th>
              <th>성별</th>
              <th>전문 분야</th>
              <th>소개글</th>
              <th>사무실</th>
              <th>지역</th>
              <th>연락처</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="6" style="text-align:center;">등록된 변호사가 없습니다.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="admin-footer">
    © 2025 TodakTodak Admin Panel
  </footer>

  <script type="module" src="../../src/js/token.js"></script>
  <!-- 2) 관리자용 fetch 인터셉트 적용 -->
  <script type="module" src="../js/tokenApi_Admin.js"></script>
  <!-- 3) 마지막에 페이지 스크립트 실행 -->
  <script type="module" src="../js/lawyers.js"></script>
  <script type="module" src="../js/admin-logout.js"></script>

</body>
</html>
