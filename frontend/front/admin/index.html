<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LawON ADMIN 대시보드</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/black.png?v=2">
  <link rel="stylesheet" href="/admin/css/admin.css?v=1">
  <link rel="stylesheet" href="/admin/css/main.css" />
</head>

<body>
  <header class="admin-header">
    <div class="logo">
      <img src="/images/black.png" alt="토닥토닥이 로고" />
      <h1>LawON ADMIN</h1>
    </div>

    <nav class="admin-nav">
      <div class="page-buttons">
        <button data-page="main" class="active">📊 대시보드</button>
        <button data-page="user">👥 회원 관리</button>
        <button data-page="lawyers">👨‍⚖️ 변호사 관리</button>
        <button data-page="logs">🧾 상담 관리</button>
        <button data-page="settings">⚙️ 설정</button>     
      </div>
      <button id="logoutBtn" class="logout">로그아웃</button>
    </nav>
  </header>

  <main class="dashboard">
    <section class="overview">
      <h2>대시보드 요약</h2>
      <div class="cards">
        <div class="card">
          <h3>👥 사용자 수</h3>
          <p id="userCount">-</p>
        </div>
        <div class="card">
          <h3>💬 누적 상담 수(오늘)</h3>
          <p id="chatCount">-</p>
        </div>
        <div class="card">
          <h3>👨‍⚖️ 변호사 등록 수</h3>
          <p id="lawCount">-</p>
        </div>
      </div>
    </section>

    <section class="recent-logs">
      <h2>🕒 최근 회원 이용 내역</h2>
      <table>
        <thead>
          <tr>
            <th>사용자</th>
            <th>상담 시작 시간</th>
            <th>상담 종료 시간</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="logTableBody">
          <tr><td colspan="4" style="text-align:center;">데이터를 불러오는 중...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer class="admin-footer">
    © 2025 LawON ADMIN Panel
  </footer>

  <!-- 1) TokenManager 먼저 로드 -->
  <script type="module" src="/src/js/token.js"></script>
  <!-- 2) 관리자용 fetch 인터셉트 적용 -->
  <script type="module" src="./js/tokenApi_Admin.js"></script>
  <!-- 3) 마지막에 페이지 스크립트 실행 -->
  <script type="module" src="/admin/js/main.js"></script>
  <script type="module" src="/admin/js/admin-logout.js"></script>


</body>
</html>
