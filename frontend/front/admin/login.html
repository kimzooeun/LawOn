<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 로그인 | 토닥토닥이</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../images/black.png?v=2">
  <link rel="stylesheet" href="./css/login.css" />
  <link rel="stylesheet" href="./css/admin.css?v=1">

</head>

<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <img src="../images/black.png" alt="토닥토닥이 로고" class="login-logo" />
      <h1>토닥토닥이 어드민</h1>
      <p class="login-sub">관리자 전용 페이지입니다</p>

      <form id="loginForm">
        <div class="login-remember">
        </div>
        <input type="text" id="adminId" placeholder="아이디" required />
        <input type="password" id="adminPw" placeholder="비밀번호" required />
        <button type="submit" id="loginBtn">로그인</button>
      </form>

      <p class="login-hint">비밀번호를 잊으셨나요? <a href="#">관리자에게 문의</a></p>
    </div>
  </div>
  <script>
  
    </script>

  <script type="module" src="js/login.js"></script>
  
  

</body>
</html>
