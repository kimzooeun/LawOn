<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원 관리 | LawON ADMIN</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/black.png?v=2">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="stylesheet" href="/admin/css/user.css">
</head>

<body>
  <header class="admin-header">
    <div class="logo">
      <img src="/images/black.png" alt="로고" />
      <h1>회원 관리</h1>
    </div>
    <nav class="admin-nav">
      <div class="page-buttons">
      <a href="/admin" class="nav-link">📊 대시보드</a>
      <a href="/admin/user" class="nav-link">👥 회원 관리</a>
      <a href="/admin/lawyers" class="nav-link">👨‍⚖️ 변호사 관리</a>
      <a href="/admin/logs" class="nav-link">🧾 상담 관리</a>
      <a href="/admin/settings" class="nav-link">⚙️ 설정</a>
      </div>
      <button id="logoutBtn" class="logout">로그아웃</button>
    </nav>
  </header>

  <main class="admin-container">
    <section class="user-table">
      <h2>전체 회원 목록</h2>
      <table id="memberTable">
        <thead>
          <tr>
            <th>번호</th>
            <th>닉네임/ID</th>
            <th>권한(A/U)</th>
            <th>제공자</th>
            <th>소셜 ID</th>
            <th>가입일</th>
            <th>수정일</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <footer class="admin-footer">
    © 2025 LawON ADMIN Panel
  </footer>

  <!-- 1) TokenManager 먼저 로드 -->
  <script type="module" src="/src/js/token.js"></script>
  <!-- 2) 관리자용 fetch 인터셉트 적용 -->
  <script type="module" src="../js/tokenApi_Admin.js"></script>

  <!-- 3) 마지막에 페이지 스크립트 실행 -->
  <script type="module" src="/admin/js/user.js"></script>
  <script>
    import { TokenManager } from '/src/js/token.js';
    document.addEventListener("DOMContentLoaded", () => {
      const logoutBtn = document.getElementById("logoutBtn");

      if (logoutBtn) {
        logoutBtn.addEventListener("click", async () => {
          let apiFailed = false; // API 실패 여부 플래그
          try{
            // 1. API 호출 시도
            const response = await fetch("/api/logout", {
              method: "POST",
              credentials: "include",
            });

            if (!response.ok) {
              apiFailed = true; // API가 200 OK가 아니어도 실패로 간주
            }
          } catch(err){
            apiFailed = true; // 네트워크 오류 등 API 호출 실패
            console.error("서버 로그아웃 API 호출 실패 : ", err);
          } finally {
              TokenManager.clearTokens();
              alert("관리자 로그아웃합니다!")
              setTimeout(() => (window.location.href = "/admin/login"), 600);
          }
        });
      }
    });
  </script>


</body>
</html>
