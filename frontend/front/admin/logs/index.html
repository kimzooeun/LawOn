<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상담 로그 | 토닥토닥이 어드민</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/black.png?v=2">
  <link rel="stylesheet" href="/admin/css/logs.css" />
  <link rel="stylesheet" href="/admin/css/admin.css?v=1">
</head>

<body>
  <header class="admin-header">
    <div class="logo">
      <img src="/images/black.png" alt="로고" />
      <h1>상담 로그 관리</h1>
    </div>
    <nav class="admin-nav">
      <div class="page-buttons">
      <a href="/admin" class="nav-link">📊 대시보드</a>
      <a href="/admin/user" class="nav-link">👥 회원 관리</a>
      <a href="/admin/lawyers" class="nav-link">👨‍⚖️ 변호사 관리</a>
      <a href="/admin/settings" class="nav-link">⚙️ 설정</a>
      </div>
      <button id="logoutBtn" class="logout">로그아웃</button>
    </nav>
  </header>

  <main class="dashboard">
    <section class="log-filter">
      <h2>상담 내역 검색</h2>
      <div class="filter-box">
        <input type="text" id="searchInput" placeholder="사용자명(닉네임)" />
        <select id="statusFilter">
          <option value="전체">상태: 전체</option>
          <option value="진행 중">진행 중</option>
          <option value="완료">완료</option>
          <option value="중단">종료</option>
        </select>
        <button id="searchBtn">검색</button>
      </div>
    </section>

    <section class="log-table">
      <h2>상담 로그 목록</h2>
      <div class="table-wrapper">
        <table id="logTable">
          <thead>
            <tr>
              <th>번호</th>
              <th>사용자</th>
              <th>상담 시작</th>
              <th>상담 종료</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="logsTableBody">
            <tr><td colspan="5" style="text-align:center;">상담 데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <div id="logModal" class="modal hidden">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3>상담 상세 보기</h3>
        <div id="logDetails"></div>
      </div>
    </div>
  </main>

  <footer class="admin-footer">
    © 2025 LawON ADMIN Panel
  </footer>

  <script type="module" src="/src/js/token.js"></script>
  <script type="module" src="../js/tokenApi_Admin.js"></script>
  <script type="module" src="/admin/js/logs.js"></script>
  <script>
    import { TokenManager } from '/src/js/token.js';
    document.addEventListener("DOMContentLoaded", () => {
      const logoutBtn = document.getElementById("logoutBtn");

      if (logoutBtn) {
        logoutBtn.addEventListener("click", async () => {
          let apiFailed = false; // API 실패 여부 플래그
          try{
            // 1. API 호출 시도
            const response = await fetch("/api/logout", {
              method: "POST",
              credentials: "include",
            });

            if (!response.ok) {
              apiFailed = true; // API가 200 OK가 아니어도 실패로 간주
            }
          } catch(err){
            apiFailed = true; // 네트워크 오류 등 API 호출 실패
            console.error("서버 로그아웃 API 호출 실패 : ", err);
          } finally {
              TokenManager.clearTokens();
              alert("관리자 로그아웃합니다!")
              setTimeout(() => (window.location.href = "/admin/login"), 600);
          }
        });
      }
    });
  </script>
</body>
</html>
