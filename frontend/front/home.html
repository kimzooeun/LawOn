<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>홈</title>
  <style>
    body { font-family: sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
    .profile { text-align:center; }
    .logout-btn { margin-top:20px; background:#fee500; border:none; padding:10px 20px; cursor:pointer; border-radius:5px; }
  </style>
</head>
<body>
  <div class="profile">
    <h2 id="welcome"></h2>
    <div class="profile">
   <h2 id="welcome"></h2> 

<div id="profile-details-container">
 </div>
    
    <button id="logoutBtn" class="logout-btn">로그아웃</button>   </div>
  </div>

<script type="module">
  import { TokenManager } from '/src/js/token.js';
  import { tokenApi } from '/src/js/tokenApi.js';

  async function loadUserProfile() {
    try {
      const accessToken = TokenManager.getAccessToken();
      if (!accessToken) {
        window.location.href = "main.html";
        return;
      }

      const response = await fetch("/api/profile/me", {
        method: "GET",
         headers: {
            "Authorization": `Bearer ${accessToken}`,
        },
      });

      if (!response.ok) {
        if (response.status === 401) {
          TokenManager.clearTokens();
          window.location.href = "main.html"; // 로그인 페이지로 리다이렉트
          return;
        }
        throw new Error("유저 정보 요청 실패");
      }

      const user = await response.json();

      // DOM에 표시
      document.getElementById("welcome").textContent = `안녕하세요, ${user.nickname}님 🌸`;

      // 프로필 이미지 추가
      const img = document.createElement("img");
      img.src = user.profileImage;
      img.style.width = "100px";
      img.style.height = "100px";
      img.style.borderRadius = "50%";
      document.querySelector(".profile").prepend(img);

      // 카카오 ID 출력 (원하면 추가)
      const idP = document.createElement("p");
      idP.textContent = `카카오 ID: ${user.kakaoId}`;
      document.querySelector(".profile").appendChild(idP);
    } catch (err) {
      console.error(err);
    }
  }

  // 로그아웃 처리
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    try {
      await fetch("/api/logout", {
        method: "POST",
        credentials: "include",
      });
      TokenManager.clearTokens();
      alert("로그아웃 완료!");
      window.location.href = "main.html";
    } catch (err) {
      console.error("로그아웃 실패:", err);
    }
  });

  loadUserProfile(); // 페이지 로드시 유저정보 불러오기
</script>
</body>
</html>
