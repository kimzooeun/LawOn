version: "3.9"
services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    image: finalproject-backend-prod
    container_name: finalproject-backend
    env_file:
      - .env
    restart: always
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    volumes:
      - ./uploads:/app/uploads
      - ./backend:/app
      - /app/build
      - gradle_cache:/home/gradle/.gradle
    depends_on:
      fastapi:
        condition: service_started
      redis:
        condition: service_healthy
  fastapi:
    build: 
      context: ./fastapi
      dockerfile: Dockerfile.prod
    image: finalproject-fastapi
    container_name: finalproject-fastapi
    ports:
      - "${FASTAPI_PORT}:8000"
    env_file:
      - .env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period : 5s
  redis:
    image: redis:7
    command: redis-server --appendonly yes
    container_name: finalproject-redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data: