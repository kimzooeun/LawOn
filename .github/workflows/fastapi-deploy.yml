name: FastAPI Deploy

on:
  push:
    paths:
      - 'fastapi/**'
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload FastAPI Folder to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "fastapi/"
          target: "/home/ubuntu/app/fastapi"

      - name: Restart FastAPI on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          timeout: 1500s
          script: |
            cd /home/ubuntu/app
            docker compose -f docker-compose.prod.yml stop fastapi || true
            docker compose -f docker-compose.prod.yml rm -f fastapi || true
            docker images -q finalproject-fastapi | xargs -r docker rmi -f
            docker image prune -f
            docker compose -f docker-compose.prod.yml build fastapi --no-cache
            docker compose -f docker-compose.prod.yml up -d fastapi

